  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            modern: {
              base: '#f8fafc',      /* Slate 50 */
              card: '#ffffff',
              primary: '#0f172a',   /* Slate 900 */
              accent: '#4f46e5',    /* Indigo 600 */
              secondary: '#3b82f6', /* Blue 500 */
              text: '#334155',      /* Slate 700 */
              muted: '#64748b',     /* Slate 500 */
              border: '#e2e8f0',    /* Slate 200 */
              bg: '#f1f5f9',        /* Slate 100 */
            }
          },
          boxShadow: {
            'neu-sm': '4px 4px 10px rgba(0,0,0,0.05), -4px -4px 10px rgba(255,255,255,0.8)',
            'neu-md': '8px 8px 16px rgba(0,0,0,0.08), -8px -8px 16px rgba(255,255,255,0.8)',
            'neu-lg': '12px 12px 24px rgba(0,0,0,0.1), -12px -12px 24px rgba(255,255,255,0.8)',
            'neu-inset': 'inset 4px 4px 8px rgba(0,0,0,0.05), inset -4px -4px 8px rgba(255,255,255,0.8)',
          },
          backgroundImage: {
            'neu-gradient': 'linear-gradient(135deg, #f1f5f9 0%, #f8fafc 100%)',
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.6s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            }
          }
        },
      },
    }
  </script>

  <style>
    @keyframes aurora {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body {
      background-color: #060c22;
      background-image:
        radial-gradient(ellipse 80% 55% at 15% 15%, rgba(79, 70, 229, 0.18) 0, transparent 60%),
        radial-gradient(ellipse 60% 45% at 85% 10%, rgba(124, 58, 237, 0.14) 0, transparent 60%),
        radial-gradient(ellipse 70% 60% at 50% 95%, rgba(37, 99, 235, 0.12) 0, transparent 60%),
        linear-gradient(-45deg, #060c22, #0d1545, #130a3e, #081428, #060c22);
      background-size: auto, auto, auto, 400% 400%;
      animation: aurora 28s ease infinite;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #0f172a;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.04);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.28);
    }
  </style>

  <!-- Unregister Service Worker to prevent caching old versions -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log('SW unregistered successfully.');
        }
      });
    }
  </script>
