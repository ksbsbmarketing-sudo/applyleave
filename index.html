<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klinik Syed Badaruddin - Leave Tracking System</title>
  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neu: {
              base: '#e0e5ec',
              shadow: '#a3b1c6',
              light: '#ffffff',
            }
          },
          boxShadow: {
            'neu-flat': '6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff',
            'neu-pressed': 'inset 6px 6px 12px #a3b1c6, inset -6px -6px 12px #ffffff',
            'neu-pressed-sm': 'inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff',
            'warning-glow': '0 0 15px rgba(239, 68, 68, 0.6), inset 2px 2px 5px #a3b1c6',
          },
          animation: {
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        },
      },
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #e0e5ec;
      font-family: 'Nunito', sans-serif;
      color: #4a5568;
    }

    /* Custom Scrollbar for Neumorphic feel */
    ::-webkit-scrollbar {
      width: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #e0e5ec;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e0;
      border-radius: 6px;
      border: 3px solid #e0e5ec;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a0aec0;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "clsx": "https://esm.sh/clsx@^2.1.1",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "tailwind-merge": "https://esm.sh/tailwind-merge@^3.4.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
