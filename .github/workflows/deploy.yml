name: Deploy to cPanel

# Bila kod di-push ke main, build & upload dist/ ke subdomain cPanel via FTP.
# Boleh juga cetus manual dari tab "Actions" di GitHub (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pasang dependencies
        run: npm ci

      - name: Build (hasilkan dist/)
        run: npm run build

      - name: Upload ke cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./dist/
          protocol: ftps
