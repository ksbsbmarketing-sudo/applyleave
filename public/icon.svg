<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" fill="url(#shine)"/>
  <!-- Calendar body -->
  <rect x="88" y="155" width="336" height="272" rx="22" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="14"/>
  <!-- Calendar header band -->
  <rect x="88" y="155" width="336" height="82" rx="22" fill="rgba(255,255,255,0.15)"/>
  <rect x="88" y="215" width="336" height="22" fill="rgba(255,255,255,0.15)"/>
  <!-- Pin left -->
  <rect x="168" y="108" width="22" height="80" rx="11" fill="rgba(255,255,255,0.7)"/>
  <!-- Pin right -->
  <rect x="322" y="108" width="22" height="80" rx="11" fill="rgba(255,255,255,0.7)"/>
  <!-- KSB label -->
  <text x="256" y="228" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" letter-spacing="4" fill="white">KSB</text>
  <!-- Calendar day dots row 1 -->
  <circle cx="162" cy="308" r="13" fill="rgba(255,255,255,0.45)"/>
  <circle cx="216" cy="308" r="13" fill="rgba(255,255,255,0.45)"/>
  <circle cx="270" cy="308" r="13" fill="rgba(255,255,255,0.45)"/>
  <circle cx="324" cy="308" r="13" fill="rgba(255,255,255,0.45)"/>
  <circle cx="378" cy="308" r="13" fill="rgba(255,255,255,0.45)"/>
  <!-- Calendar day dots row 2 -->
  <circle cx="162" cy="368" r="13" fill="rgba(255,255,255,0.45)"/>
  <!-- Highlighted today -->
  <circle cx="216" cy="368" r="18" fill="#3b82f6"/>
  <text x="216" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="white">✓</text>
  <circle cx="270" cy="368" r="13" fill="rgba(255,255,255,0.45)"/>
  <circle cx="324" cy="368" r="13" fill="rgba(255,255,255,0.45)"/>
  <circle cx="378" cy="368" r="13" fill="rgba(255,255,255,0.45)"/>
</svg>
