  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neu: {
              base: '#e0e5ec',
              shadow: '#a3b1c6',
              light: '#ffffff',
            }
          },
          boxShadow: {
            'neu-flat': '6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff',
            'neu-pressed': 'inset 6px 6px 12px #a3b1c6, inset -6px -6px 12px #ffffff',
            'neu-pressed-sm': 'inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff',
            'warning-glow': '0 0 15px rgba(239, 68, 68, 0.6), inset 2px 2px 5px #a3b1c6',
          },
          animation: {
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        },
      },
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #e0e5ec;
      font-family: 'Nunito', sans-serif;
      color: #4a5568;
    }

    /* Custom Scrollbar for Neumorphic feel */
    ::-webkit-scrollbar {
      width: 12px;
    }

    ::-webkit-scrollbar-track {

    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e0;
      border-radius: 6px;
      border: 3px solid #e0e5ec;
    }

    }

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>

  <!-- Unregister Service Worker to prevent caching old versions -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log('SW unregistered successfully.');
        }
      });
    }
  </script>
</body>
